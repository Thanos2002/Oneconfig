name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          
      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/Thanos2002/Oneconfig/cmd.Version=${GITHUB_REF_NAME}"
          
          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/oneconfig-linux-amd64 .
          
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/oneconfig-linux-arm64 .
          
          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/oneconfig-darwin-amd64 .
          
          # macOS arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/oneconfig-darwin-arm64 .
          
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/oneconfig-windows-amd64.exe .

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
