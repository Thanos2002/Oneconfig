name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          
      - name: Build binaries
        run: |
          mkdir -p dist
          
          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X github.com/oneconfig/oneconfig/cmd.Version=${GITHUB_REF_NAME}" -o dist/oneconfig-linux-amd64 .
          
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X github.com/oneconfig/oneconfig/cmd.Version=${GITHUB_REF_NAME}" -o dist/oneconfig-linux-arm64 .
          
          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X github.com/oneconfig/oneconfig/cmd.Version=${GITHUB_REF_NAME}" -o dist/oneconfig-darwin-amd64 .
          
          # macOS arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X github.com/oneconfig/oneconfig/cmd.Version=${GITHUB_REF_NAME}" -o dist/oneconfig-darwin-arm64 .
          
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X github.com/oneconfig/oneconfig/cmd.Version=${GITHUB_REF_NAME}" -o dist/oneconfig-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
